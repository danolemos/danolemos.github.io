<!DOCTYPE HTML>

<html>
	<head>
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar using CSS</title>
    <link rel="stylesheet" href="style.css">
	</head>
<body>
	<div class="container">
        <aside id="sidebar">
            <input type="checkbox" name="" id="toggler">
            <label for="toggler" class="toggle-btn">
                <!-- Icon For Sidebar Toggle -->
            </label>
            <ul class="sidebar-nav">

                <!-- Sidebar Navigation Link -->

            </ul>
            <div class="sidebar-footer">
                <a href="#" class="sidebar-link">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>
        <div class="main">
            <div class="content">
                <h1>Sidebar with HTML-CSS-Only</h1>
            </div>
        </div>
    </div>
	
<center>
	
<h1 style="color:Tomato;font-size:300%">
	
	<label for="cancoes">Escolha uma canção:</label>
	
</h1>

<select id="cancoes" onchange="carregarCancao()">
	<option value="" disabled selected>Selecione uma opção</optionv></option>
	<option value="cancao_do_paraiso.html">Canção do Paraíso</option>
	<option value="cancao_de_natal.html">Canção de Natal</option>	
</select>
	
</center>

<script>
	function carregarCancao(){
		const select = document.getElementById('cancoes');
		const valor = select.value
		if(valor){
			window.location.href = valor;
		}
	}
</script>
</body>
</html>
